name: Build release ZIP

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare package
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          PACKAGE="redmine_external_issue_links_${VERSION}"
          mkdir -p "$PACKAGE"
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude="$PACKAGE" \
            ./ "$PACKAGE/"
          zip -r "redmine_external_issue_links_${VERSION}.zip" "$PACKAGE"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: redmine_external_issue_links
          path: redmine_external_issue_links_*.zip

      - name: Attach ZIP to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: redmine_external_issue_links_*.zip
